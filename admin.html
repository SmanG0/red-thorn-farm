<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Red Thorn · Kitchen Admin</title>
<link rel="icon" type="image/png" href="assets/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #faf8f5;
  --paper:   #f3f0eb;
  --ink:     #181311;
  --ink-2:   #4a3f38;
  --accent:  #8b5826;
  --muted:   #9a8880;
  --hair:    rgba(24,19,17,.1);
  --green:   #2a6b2a;
  --amber:   #b45309;
  --red:     #8b2626;
  --blue:    #2563a8;
  --f-d: 'Cormorant Garamond', Georgia, serif;
  --f-b: 'Work Sans', system-ui, sans-serif;

  /* status palette */
  --s-pending:   #b45309;
  --s-confirmed: #2a6b2a;
  --s-delivered: #9a8880;
  --s-cancelled: #8b2626;
}

body { font-family: var(--f-b); font-size: 14px; background: var(--bg); color: var(--ink); min-height: 100vh; }

/* ── LOCK SCREEN ───────────────────────────────────────── */
#lock-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: var(--ink);
}
.lock-box {
  width: 100%;
  max-width: 340px;
  background: var(--paper);
  padding: 40px 36px;
}
.lock-box__wordmark { font-family: var(--f-d); font-size: 24px; font-weight: 500; color: var(--ink); }
.lock-box__sub { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin: 4px 0 32px; }
.lock-box input {
  width: 100%; border: 1px solid rgba(24,19,17,.2); background: var(--bg);
  padding: 12px 14px; font-family: var(--f-b); font-size: 14px; color: var(--ink);
  outline: none; margin-bottom: 10px; border-radius: 0;
}
.lock-box input:focus { border-color: var(--accent); }
.lock-box button {
  width: 100%; background: var(--ink); color: var(--bg); border: none;
  padding: 14px; font-family: var(--f-b); font-size: 10px; font-weight: 600;
  letter-spacing: 0.22em; text-transform: uppercase; cursor: pointer; transition: background .2s;
}
.lock-box button:hover { background: var(--accent); }
.lock-error { font-size: 12px; color: var(--red); margin-top: 10px; display: none; }

/* ── APP SHELL ─────────────────────────────────────────── */
#app { display: none; }

/* ── HEADER ────────────────────────────────────────────── */
.admin-header {
  background: var(--ink);
  color: var(--bg);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 clamp(14px, 3vw, 36px);
  height: 52px;
  position: sticky;
  top: 0;
  z-index: 200;
}
.admin-header__wordmark { font-family: var(--f-d); font-size: 17px; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
.admin-header__sep { width: 1px; height: 20px; background: rgba(250,248,245,.15); flex-shrink: 0; }
.admin-nav { display: flex; gap: 2px; flex: 1; }
.nav-btn {
  background: transparent; border: none;
  color: rgba(250,248,245,.45); font-family: var(--f-b);
  font-size: 10px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase;
  padding: 6px 12px; cursor: pointer; transition: color .15s, background .15s; border-radius: 2px;
}
.nav-btn:hover { color: rgba(250,248,245,.8); }
.nav-btn.active { background: rgba(250,248,245,.1); color: var(--bg); }
.admin-header__right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; margin-left: auto; }
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: #4caf50; transition: background .3s;
}
.sync-dot--loading { background: var(--amber); animation: pulse 1s infinite; }
.sync-dot--error   { background: var(--red); }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
.icon-btn {
  background: transparent; border: 1px solid rgba(250,248,245,.15);
  color: rgba(250,248,245,.5); font-family: var(--f-b); font-size: 10px; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase; padding: 4px 10px;
  cursor: pointer; transition: border-color .2s, color .2s;
}
.icon-btn:hover { border-color: rgba(250,248,245,.35); color: rgba(250,248,245,.85); }

/* ── WEEK BAR ──────────────────────────────────────────── */
.week-bar {
  background: var(--paper);
  border-bottom: 1px solid var(--hair);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px clamp(14px, 3vw, 36px);
  gap: 12px;
}
.week-bar__label {
  font-family: var(--f-d);
  font-size: clamp(14px, 2.5vw, 18px);
  font-weight: 500;
  color: var(--ink);
  text-align: center;
  flex: 1;
}
.week-bar__label span { font-style: italic; color: var(--accent); }
.week-nav {
  background: transparent; border: 1px solid var(--hair); color: var(--ink);
  font-size: 14px; width: 32px; height: 32px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .2s, color .2s; flex-shrink: 0;
}
.week-nav:hover { border-color: var(--accent); color: var(--accent); }
.week-nav:disabled { opacity: .3; cursor: default; }

/* ── MAIN CONTENT ──────────────────────────────────────── */
.admin-main {
  max-width: 960px;
  margin: 0 auto;
  padding: clamp(16px, 3vw, 32px) clamp(14px, 3vw, 36px) 80px;
}

/* ── STATS STRIP ───────────────────────────────────────── */
.stats-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}
.stat-tile {
  background: var(--paper);
  border: 1px solid var(--hair);
  padding: 14px 16px;
  position: relative;
  overflow: hidden;
}
.stat-tile::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--hair);
}
.stat-tile--pending::before   { background: var(--s-pending); }
.stat-tile--confirmed::before { background: var(--s-confirmed); }
.stat-tile--delivered::before { background: var(--s-delivered); }
.stat-tile--revenue::before   { background: var(--accent); }
.stat-tile__n {
  font-family: var(--f-d);
  font-size: clamp(20px, 3vw, 30px);
  font-weight: 500;
  color: var(--ink);
  line-height: 1;
  margin-bottom: 4px;
}
.stat-tile__label {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
}
.stat-tile__sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 3px;
}

/* ── BULK CONFIRM BAR ──────────────────────────────────── */
.bulk-bar {
  display: none;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  background: #fef3cd;
  border: 1px solid rgba(180,83,9,.25);
  padding: 12px 16px;
  margin-bottom: 20px;
}
.bulk-bar__msg { font-size: 13px; color: #713509; }
.bulk-bar__msg strong { font-weight: 600; }
.bulk-bar__btn {
  background: var(--amber); color: white; border: none;
  font-family: var(--f-b); font-size: 10px; font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase;
  padding: 9px 18px; cursor: pointer; transition: background .2s;
  white-space: nowrap; flex-shrink: 0;
}
.bulk-bar__btn:hover { background: #92410a; }
.bulk-bar__btn:disabled { opacity: .5; cursor: default; }

/* ── STATUS FILTER CHIPS ───────────────────────────────── */
.filter-chips {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.chip {
  font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
  text-transform: uppercase; padding: 6px 14px;
  border: 1px solid var(--hair); background: transparent;
  color: var(--muted); cursor: pointer; transition: all .15s;
}
.chip:hover { border-color: var(--ink); color: var(--ink); }
.chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.chip--pending.active   { background: var(--s-pending);   border-color: var(--s-pending); }
.chip--confirmed.active { background: var(--s-confirmed); border-color: var(--s-confirmed); }
.chip--delivered.active { background: var(--s-delivered); border-color: var(--s-delivered); }
.chip--cancelled.active { background: var(--s-cancelled); border-color: var(--s-cancelled); }

/* ── ORDER CARD ────────────────────────────────────────── */
.orders-list { display: flex; flex-direction: column; gap: 10px; }
.orders-section { margin-bottom: 28px; }
.section-label {
  font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
  padding-bottom: 8px; border-bottom: 1px solid var(--hair);
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.status-dot--pending   { background: var(--s-pending); }
.status-dot--confirmed { background: var(--s-confirmed); }
.status-dot--delivered { background: var(--s-delivered); }
.status-dot--cancelled { background: var(--s-cancelled); }

.order-card {
  background: var(--paper);
  border: 1px solid var(--hair);
  border-left: 4px solid var(--hair);
  overflow: hidden;
  transition: box-shadow .2s;
}
.order-card:hover { box-shadow: 0 3px 16px rgba(24,19,17,.08); }
.order-card--pending   { border-left-color: var(--s-pending); }
.order-card--confirmed { border-left-color: var(--s-confirmed); }
.order-card--delivered { border-left-color: var(--s-delivered); }
.order-card--cancelled { border-left-color: var(--s-cancelled); opacity: .65; }

/* Card head */
.order-card__head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--hair);
}
.card-num {
  font-family: var(--f-d); font-size: 13px; font-weight: 500;
  color: var(--muted); white-space: nowrap; flex-shrink: 0;
}
.card-name { font-size: 14px; font-weight: 600; color: var(--ink); flex: 1; min-width: 100px; }
.card-age { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
.status-badge {
  font-size: 8px; font-weight: 700; letter-spacing: 0.2em;
  text-transform: uppercase; padding: 3px 9px; border: 1px solid;
  flex-shrink: 0;
}
.status-badge--pending   { color: var(--s-pending);   border-color: rgba(180,83,9,.3);  background: rgba(180,83,9,.07); }
.status-badge--confirmed { color: var(--s-confirmed); border-color: rgba(42,107,42,.3); background: rgba(42,107,42,.07); }
.status-badge--delivered { color: var(--s-delivered); border-color: rgba(154,136,128,.3); }
.status-badge--cancelled { color: var(--s-cancelled); border-color: rgba(139,38,38,.3); background: rgba(139,38,38,.05); }

/* Card body */
.order-card__body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

.card-items { display: flex; flex-direction: column; gap: 4px; }
.card-item { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; font-size: 13px; color: var(--ink-2); }
.card-item__price { font-family: var(--f-d); font-size: 14px; color: var(--ink); flex-shrink: 0; }

.card-total-row {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 10px; border-top: 1px solid var(--hair);
}
.card-total {
  font-family: var(--f-d);
  font-size: 22px; font-weight: 500; color: var(--ink);
}

.card-mpesa {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg); padding: 8px 12px;
}
.card-mpesa__label {
  font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); flex-shrink: 0;
}
.card-mpesa__code { font-size: 14px; font-weight: 600; letter-spacing: 0.06em; }
.card-mpesa--ok .card-mpesa__code    { color: var(--s-confirmed); }
.card-mpesa--missing .card-mpesa__code { color: var(--red); font-weight: 400; font-style: italic; font-size: 13px; }

.card-contact { display: flex; flex-direction: column; gap: 5px; }
.card-phone { font-size: 13px; color: var(--accent); text-decoration: none; font-weight: 500; }
.card-phone:hover { text-decoration: underline; }
.card-address { font-size: 13px; color: var(--ink-2); }
.card-address a { color: inherit; text-decoration: none; }
.card-address a:hover { color: var(--accent); text-decoration: underline; }
.card-customer-note { font-size: 12px; color: var(--muted); font-style: italic; line-height: 1.5; }

/* Card actions */
.card-action-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  padding-top: 10px;
  border-top: 1px solid var(--hair);
}
.btn-wa {
  display: inline-flex; align-items: center;
  background: var(--s-confirmed); color: white;
  font-family: var(--f-b); font-size: 10px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 9px 16px; text-decoration: none;
  transition: background .2s; flex-shrink: 0;
}
.btn-wa:hover { background: #1e5220; }
.card-actions { display: flex; flex-wrap: wrap; gap: 6px; }
.action-btn {
  font-family: var(--f-b); font-size: 9px; font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase;
  padding: 8px 14px; border: 1px solid; cursor: pointer;
  background: transparent; transition: background .2s, color .2s;
}
.action-btn:disabled { opacity: .35; cursor: default; }
.action-btn--confirm { color: var(--s-confirmed); border-color: rgba(42,107,42,.4); }
.action-btn--confirm:hover:not(:disabled) { background: var(--s-confirmed); color: white; }
.action-btn--deliver { color: var(--ink); border-color: rgba(24,19,17,.25); }
.action-btn--deliver:hover:not(:disabled) { background: var(--ink); color: var(--bg); }
.action-btn--revert  { color: var(--muted); border-color: rgba(154,136,128,.35); }
.action-btn--revert:hover:not(:disabled)  { background: var(--muted); color: white; }
.action-btn--cancel  { color: var(--red); border-color: rgba(139,38,38,.3); }
.action-btn--cancel:hover:not(:disabled)  { background: var(--red); color: white; }

/* Admin notes */
.card-admin-notes { border-top: 1px solid var(--hair); padding-top: 10px; }
.card-admin-notes__input {
  width: 100%; background: var(--bg); border: 1px solid var(--hair);
  border-radius: 0; padding: 8px 10px; font-family: var(--f-b); font-size: 12px;
  color: var(--ink); resize: none; min-height: 40px; outline: none;
  transition: border-color .2s; line-height: 1.5;
}
.card-admin-notes__input:focus { border-color: var(--accent); }
.card-admin-notes__input::placeholder { color: rgba(24,19,17,.3); font-style: italic; }
.card-admin-notes__label {
  font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 5px; display: block;
}

/* ── PRODUCTION SHEET ──────────────────────────────────── */
.production-sheet {
  background: var(--paper);
  border: 1px solid var(--hair);
  padding: clamp(20px, 4vw, 36px);
}
.production-sheet__header { margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--hair); }
.production-sheet__title {
  font-family: var(--f-d); font-size: clamp(22px, 3vw, 32px); font-weight: 500;
  color: var(--ink); margin-bottom: 4px;
}
.production-sheet__subtitle { font-size: 13px; color: var(--muted); margin-bottom: 2px; }
.production-sheet__meta {
  display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap;
}
.prod-meta-pill {
  font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
  padding: 3px 10px; border: 1px solid;
}
.prod-meta-pill--confirmed { color: var(--s-confirmed); border-color: rgba(42,107,42,.3); background: rgba(42,107,42,.06); }
.prod-meta-pill--pending   { color: var(--s-pending);   border-color: rgba(180,83,9,.3);  background: rgba(180,83,9,.06); }

.prod-table { display: flex; flex-direction: column; gap: 0; margin-bottom: 32px; }
.prod-row {
  display: grid;
  grid-template-columns: 180px 1fr 80px 70px;
  gap: 12px;
  align-items: center;
  padding: 11px 0;
  border-bottom: 1px solid var(--hair);
}
.prod-row__name { font-size: 14px; color: var(--ink); font-weight: 500; }
.prod-row__bar-wrap { position: relative; }
.prod-row__bar-track {
  height: 8px; background: rgba(24,19,17,.07); border-radius: 0;
  overflow: hidden; position: relative;
}
.prod-row__bar {
  height: 100%; background: rgba(139,88,38,.2);
  position: relative; transition: width .6s ease;
}
.prod-row__bar-confirmed {
  position: absolute; top: 0; left: 0; height: 100%;
  background: var(--accent);
}
.prod-row__qty { font-family: var(--f-d); font-size: 16px; font-weight: 500; color: var(--ink); text-align: right; }
.prod-row__orders { font-size: 11px; color: var(--muted); text-align: right; white-space: nowrap; }

/* Pack list within production */
.pack-section { margin-top: 28px; }
.pack-section__title {
  font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 12px;
  border-bottom: 1px solid var(--hair); padding-bottom: 8px;
}
.pack-list { display: flex; flex-direction: column; gap: 8px; }
.pack-order {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  background: var(--bg);
  border: 1px solid var(--hair);
  padding: 10px 14px;
  align-items: start;
}
.pack-order__name { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
.pack-order__items { font-size: 12px; color: var(--ink-2); }
.pack-order__ref { font-size: 11px; color: var(--muted); font-family: var(--f-d); }
.pack-order__addr { font-size: 11px; color: var(--muted); margin-top: 2px; }
.pack-order__wa {
  display: inline-flex; background: var(--s-confirmed); color: white;
  font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 5px 10px; text-decoration: none; transition: background .2s; flex-shrink: 0;
}
.pack-order__wa:hover { background: #1e5220; }

.print-btn {
  margin-top: 24px; display: inline-flex;
  background: var(--ink); color: var(--bg); border: none;
  font-family: var(--f-b); font-size: 10px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  padding: 12px 24px; cursor: pointer; transition: background .2s;
}
.print-btn:hover { background: var(--accent); }

/* ── EMPTY STATE ───────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 60px 20px;
  font-family: var(--f-d); font-style: italic; font-size: 22px;
  color: var(--muted);
}
.empty-state__icon { font-size: 40px; margin-bottom: 12px; opacity: .5; }

/* ── TOASTS ────────────────────────────────────────────── */
#toasts {
  position: fixed; bottom: 24px; right: 20px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 9999; pointer-events: none;
}
.toast {
  background: var(--ink); color: var(--bg);
  padding: 11px 18px; font-size: 13px;
  transform: translateX(110%); transition: transform .25s ease;
  pointer-events: auto;
  max-width: 300px;
}
.toast--in { transform: translateX(0); }
.toast--error   { background: var(--red); }
.toast--warning { background: var(--amber); }

/* ── CALENDAR VIEW ─────────────────────────────────────── */
.cal-wrap {
  background: var(--paper);
  border: 1px solid var(--hair);
  overflow: hidden;
}
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--hair);
  background: var(--ink);
  color: var(--bg);
}
.cal-header__month {
  font-family: var(--f-d);
  font-size: 20px;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.cal-nav {
  background: transparent; border: 1px solid rgba(250,248,245,.2);
  color: rgba(250,248,245,.7); width: 30px; height: 30px;
  cursor: pointer; font-size: 14px; display: flex;
  align-items: center; justify-content: center; transition: all .15s;
}
.cal-nav:hover { border-color: rgba(250,248,245,.5); color: var(--bg); }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}
.cal-day-head {
  font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--muted); text-align: center; padding: 10px 4px;
  border-bottom: 1px solid var(--hair);
}
.cal-day-head--fri { color: var(--accent); }

.cal-cell {
  min-height: 72px;
  border-right: 1px solid var(--hair);
  border-bottom: 1px solid var(--hair);
  padding: 6px;
  position: relative;
  background: var(--bg);
  transition: background .15s;
}
.cal-cell:nth-child(7n) { border-right: none; }
.cal-cell--other-month { background: var(--paper); }
.cal-cell--other-month .cal-cell__num { opacity: .3; }
.cal-cell--today { background: rgba(139,88,38,.04); }
.cal-cell--today .cal-cell__num { color: var(--accent); font-weight: 600; }
.cal-cell[data-date]       { cursor: pointer; }
.cal-cell[data-date]:hover { background: rgba(139,88,38,.05); }

function getFriday(offset) {
  var d = new Date();
  var day = d.getDay();
  var toFri = day <= 5 ? 5 - day : 6;

  d.setHours(0, 0, 0, 0);

function getNearestFriday(isoDate) {

  d.setDate(d.getDate() + daysToFriday);
  return weekStr(d);
}

function fmtFriday(d) {
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' });
}
function timeAgo(ts) {
  var diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60)   return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400)return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}
function fmtPhone(p) { return (p || '').replace(/[^0-9+]/g, ''); }
function statusLabel(st) {
  return { pending:'Pending', confirmed:'Confirmed', delivered:'Delivered', cancelled:'Cancelled' }[st] || st;
}
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Admin notes (localStorage) ────────────────────────────────────
var NKEY = 'rt-admin-notes';
function loadNote(id) {

}

}

// ── API ──────────────────────────────────────────────────────────
async function convexQ(path, args) {
  var res = await fetch(CONVEX + '/api/query', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: path, args: args || {}, format: 'json' })
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  var d = await res.json();
  if (d.status !== 'success') throw new Error(JSON.stringify(d));
  return d.value;
}
async function convexM(path, args) {
  var res = await fetch(CONVEX + '/api/mutation', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: path, args: args || {}, format: 'json' })
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  var d = await res.json();
  if (d.status !== 'success') throw new Error(JSON.stringify(d));
  return d.value;
}

// ── Status update (with optimistic local update) ───────────────────
async function updateStatus(orderId, newStatus) {
  s.orders = s.orders.map(function(o) {
    return o._id === orderId ? Object.assign({}, o, { status: newStatus }) : o;
  });
  render();
  if (orderId.indexOf('demo-') === 0) {
    toast(statusLabel(newStatus) + ' (demo only)');
    return;
  }
  try {
    await convexM('orders:updateStatus', { orderId: orderId, status: newStatus });
    toast(statusLabel(newStatus));
  } catch(e) {
    toast('Error: ' + e.message, 'error');
    fetchOrders(); // revert
  }
}

// ── Bulk confirm ──────────────────────────────────────────────────
async function bulkConfirm() {
  var wk = currentWeek();
  var pending = s.orders.filter(function(o) { return o.deliveryWeek === wk && o.status === 'pending'; });
  if (!pending.length) return;
  var btn = document.getElementById('bulk-btn');
  btn.disabled = true;
  btn.textContent = 'Confirming…';
  var count = 0;
  for (var i = 0; i < pending.length; i++) {
    try {
      await convexM('orders:updateStatus', { orderId: pending[i]._id, status: 'confirmed' });
      s.orders = s.orders.map(function(o) {
        return o._id === pending[i]._id ? Object.assign({}, o, { status: 'confirmed' }) : o;
      });
      count++;
      render(); // update after each
    } catch(e) { console.error(e); }
  }
  toast(count + ' orders confirmed');
  btn.disabled = false;
  btn.textContent = 'Confirm all pending';
}

// ── Toast ─────────────────────────────────────────────────────────
function toast(msg, type) {
  var t = document.createElement('div');
  t.className = 'toast' + (type ? ' toast--' + type : '');
  t.textContent = msg;
  document.getElementById('toasts').appendChild(t);
  requestAnimationFrame(function() { t.classList.add('toast--in'); });
  setTimeout(function() {
    t.classList.remove('toast--in');
    setTimeout(function() { t.parentNode && t.parentNode.removeChild(t); }, 300);
  }, 2800);
}

function setSyncStatus(st) {
  document.getElementById('sync-dot').className = 'sync-dot sync-dot--' + st;
}

// ── Production aggregation ────────────────────────────────────────
function getProduction(wk, allOrders) {
  var orders = (allOrders || s.orders).filter(function(o) { return o.deliveryWeek === wk && o.status !== 'cancelled'; });
  var map = {};
  orders.forEach(function(order) {
    order.items.forEach(function(item) {
      var k = item.product;
      if (!map[k]) map[k] = { qty: 0, unit: item.unit, orderCount: 0, confirmedQty: 0 };
      map[k].qty += item.qty;
      map[k].orderCount++;
      if (order.status === 'confirmed' || order.status === 'delivered') map[k].confirmedQty += item.qty;
    });
  });
  return Object.keys(map).map(function(k) { return Object.assign({ name: k }, map[k]); })
    .sort(function(a, b) { return b.qty - a.qty; });
}

// ── Main render ───────────────────────────────────────────────────
function render() {
  var wk = currentWeek();
  var fri = getFriday(s.weekOffset);

  // Update week label
  var isThis = s.weekOffset === 0;
  var isNext = s.weekOffset === 1;
  var label = fmtFriday(fri);
  if (isThis) label = 'This Friday, ' + fri.toLocaleDateString('en-GB', { day: 'numeric', month: 'long' });
  else if (isNext) label = 'Next Friday, ' + fri.toLocaleDateString('en-GB', { day: 'numeric', month: 'long' });
  document.getElementById('week-label').textContent = label;

  // Stats (always for selected week)
  var wkOrders = getDisplayOrders().filter(function(o) { return o.deliveryWeek === wk; });
  var pending   = wkOrders.filter(function(o) { return o.status === 'pending'; });
  var confirmed = wkOrders.filter(function(o) { return o.status === 'confirmed'; });
  var delivered = wkOrders.filter(function(o) { return o.status === 'delivered'; });
  var revenue = wkOrders.filter(function(o) { return o.status !== 'cancelled'; })
    .reduce(function(s, o) { return s + o.total; }, 0);
  var confRev = wkOrders.filter(function(o) { return o.status === 'confirmed' || o.status === 'delivered'; })
    .reduce(function(s, o) { return s + o.total; }, 0);

  document.getElementById('stat-pending').textContent   = pending.length;
  document.getElementById('stat-confirmed').textContent = confirmed.length;
  document.getElementById('stat-delivered').textContent = delivered.length;
  document.getElementById('stat-revenue').textContent   = 'KSh ' + revenue.toLocaleString();
  document.getElementById('stat-confirmed-rev').textContent = confRev > 0 ? 'KSh ' + confRev.toLocaleString() + ' confirmed' : '';

  // Bulk bar
  var bb = document.getElementById('bulk-bar');
  if (pending.length > 0 && s.view === 'dashboard') {
    bb.style.display = 'flex';
    document.getElementById('bulk-count').textContent = pending.length;
  } else {
    bb.style.display = 'none';
  }

  // Filter chips visibility
  document.getElementById('filter-chips').style.display = s.view === 'orders' ? 'flex' : 'none';

  // Hide week bar + bulk bar in calendar view (calendar has its own nav)
  var hideWeekBar = s.view === 'calendar' || s.view === 'batches' || s.view === 'products';
  document.querySelector('.week-bar').style.display = hideWeekBar ? 'none' : '';
  if (hideWeekBar) bb.style.display = 'none';

  // Render view
  if (s.view === 'dashboard')  renderDashboard(wk, wkOrders);
  else if (s.view === 'orders')      renderAllOrders();
  else if (s.view === 'production')  renderProduction(wk, fri);
  else if (s.view === 'calendar')    renderCalendar();
  else if (s.view === 'batches')     renderBatches();
  else if (s.view === 'products')    renderProducts();
}

      html += '<div class="pack-order__addr"><a href="' + esc(maps) + '" target="_blank" rel="noopener">' + esc(o.deliveryAddress) + '</a></div>';

// ── Calendar view ─────────────────────────────────────────────────
var calMonth = (function(){ var d = new Date(); d.setDate(1); d.setHours(0,0,0,0); return d; })();

function renderCalendar() {
  var now = new Date();
  var year  = calMonth.getFullYear();
  var month = calMonth.getMonth();

  // Month name
  var monthName = calMonth.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });

  // Build index: deliveryWeek ISO → orders[]
  var byFriday = {};
  getDisplayOrders().forEach(function(o) {
    if (!byFriday[o.deliveryWeek]) byFriday[o.deliveryWeek] = [];
    byFriday[o.deliveryWeek].push(o);
  });

  // First cell of the grid (Monday-anchored)
  var firstDay = new Date(year, month, 1);
  var startDow = (firstDay.getDay() + 6) % 7; // Mon=0 … Sun=6
  var daysInMonth = new Date(year, month + 1, 0).getDate();
  var prevMonthDays = new Date(year, month, 0).getDate();

  var dayHeads = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  var cells = '';

  // Day headings
  dayHeads.forEach(function(d, i) {
    cells += '<div class="cal-day-head' + (i === 4 ? ' cal-day-head--fri' : '') + '">' + d + '</div>';
  });

  // Prefix cells (previous month)
  for (var p = startDow - 1; p >= 0; p--) {
    cells += '<div class="cal-cell cal-cell--other-month"><span class="cal-cell__num">' + (prevMonthDays - p) + '</span></div>';
  }

  // Current month cells
  for (var d = 1; d <= daysInMonth; d++) {
    var cellDate = new Date(year, month, d);
    var dow = cellDate.getDay(); // 0=Sun, 5=Fri
    var isFriday = dow === 5;
    var isToday  = cellDate.toDateString() === now.toDateString();
    var iso      = cellDate.toISOString().slice(0, 10);
    var fOrders = isFriday ? (byFriday[iso] || []).filter(function(o){ return o.status !== 'cancelled'; }) : [];
    var cls = 'cal-cell';
    if (isFriday) cls += ' cal-cell--friday';
    if (isFriday) cls += fOrders.length ? ' cal-cell--has-orders' : ' cal-cell--no-orders';
    if (isToday)  cls += ' cal-cell--today';

    var badges = '';
    if (isFriday) {
      var fPending = fOrders.filter(function(o) { return o.status === 'pending'; });
      var fRevenue = fOrders.reduce(function(sum, o) { return sum + o.total; }, 0);
      badges += '<div class="cal-friday-badges">';
      if (fOrders.length) {
        badges += '<div class="cal-friday-badge cal-friday-badge--orders">' + fOrders.length + ' order' + (fOrders.length !== 1 ? 's' : '') + '</div>';
        if (fRevenue) badges += '<div class="cal-friday-badge cal-friday-badge--revenue">KSh ' + fRevenue.toLocaleString() + '</div>';
        if (fPending.length) badges += '<div class="cal-friday-badge cal-friday-badge--pending">' + fPending.length + ' pending</div>';
      } else {
        badges += '<div class="cal-friday-badge cal-friday-badge--empty">no orders</div>';
      }
      badges += '</div>';
    }

    cells += '<div class="' + cls + '" data-date="' + iso + '"><span class="cal-cell__num">' + d + '</span>' + badges + '</div>';
  }

  // Suffix cells
  var totalCells = startDow + daysInMonth;
  var remainder  = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (var n = 1; n <= remainder; n++) {
    cells += '<div class="cal-cell cal-cell--other-month"><span class="cal-cell__num">' + n + '</span></div>';
  }

  var html = '<div class="cal-wrap">';
  html += '<div class="cal-header">';
  html += '<button class="cal-nav" id="cal-prev">‹</button>';
  html += '<div class="cal-header__month">' + esc(monthName) + '</div>';
  html += '<button class="cal-nav" id="cal-next">›</button>';
  html += '</div>';
  html += '<div class="cal-grid">' + cells + '</div>';
  html += '</div>';

  document.getElementById('orders-container').innerHTML = html;

  // Bind month navigation
  document.getElementById('cal-prev').addEventListener('click', function() {
    calMonth.setMonth(calMonth.getMonth() - 1);
    renderCalendar();
  });
  document.getElementById('cal-next').addEventListener('click', function() {
    calMonth.setMonth(calMonth.getMonth() + 1);
    renderCalendar();
  });

  // Any day opens a modal for that week's Friday orders
  document.querySelectorAll('.cal-cell[data-date]').forEach(function(cell) {
    cell.addEventListener('click', function() {
      openCalModal(getNearestFriday(cell.dataset.date));
    });
  });
}

      if (b) openBatchModal(b);
    });
  });

  document.querySelectorAll('[data-delete-batch]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      if (!confirm('Delete this batch?')) return;
      convexM('batches:deleteBatch', { batchId: btn.dataset.deleteBatch })
        .then(function() { toast('Batch deleted'); fetchBatches(); })
        .catch(function(e) { toast('Error: ' + e.message, 'error'); });
    });
  });

  renderBatchCal();
}

// Minimal calendar for batch dates
var batchCalMonth = (function(){ var d = new Date(); d.setDate(1); d.setHours(0,0,0,0); return d; })();

function renderBatchCal() {
  var container = document.getElementById('batch-cal-container');
  if (!container) return;

  var now = new Date();
  var year  = batchCalMonth.getFullYear();
  var month = batchCalMonth.getMonth();
  var monthName = batchCalMonth.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });

  // Index batch dates
  var batchByDate = {};
  s.batches.forEach(function(b) {
    if (!batchByDate[b.batchDate]) batchByDate[b.batchDate] = [];
    batchByDate[b.batchDate].push(b);
  });

  var firstDay = new Date(year, month, 1);
  var startDow = (firstDay.getDay() + 6) % 7;
  var daysInMonth = new Date(year, month + 1, 0).getDate();
  var prevMonthDays = new Date(year, month, 0).getDate();
  var dayHeads = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  var cells = '';
  dayHeads.forEach(function(d, i) {
    cells += '<div class="cal-day-head' + (i === 4 ? ' cal-day-head--fri' : '') + '">' + d + '</div>';
  });
  for (var p = startDow - 1; p >= 0; p--) {
    cells += '<div class="cal-cell cal-cell--other-month"><span class="cal-cell__num">' + (prevMonthDays - p) + '</span></div>';
  }
  for (var d = 1; d <= daysInMonth; d++) {
    var cellDate = new Date(year, month, d);
    var isToday = cellDate.toDateString() === now.toDateString();
    var iso = cellDate.toISOString().slice(0, 10);
    var dayBatches = batchByDate[iso] || [];
    var cls = 'cal-cell';
    if (isToday) cls += ' cal-cell--today';
    if (dayBatches.length) cls += ' cal-cell--batch';

    var badges = '';
    if (dayBatches.length) {
      badges = '<div class="cal-friday-badges">';
      dayBatches.forEach(function(b) {
        badges += '<div class="cal-friday-badge cal-friday-badge--batch">' + esc(batchStatusLabel(b.status)) + '</div>';
      });
      badges += '</div>';
    }
    cells += '<div class="' + cls + '" data-batch-date="' + iso + '"><span class="cal-cell__num">' + d + '</span>' + badges + '</div>';
  }
  var totalCells = startDow + daysInMonth;
  var remainder = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (var n = 1; n <= remainder; n++) {
    cells += '<div class="cal-cell cal-cell--other-month"><span class="cal-cell__num">' + n + '</span></div>';
  }

  var html = '<div class="cal-wrap"><div class="cal-header">';
  html += '<button class="cal-nav" id="bcal-prev">‹</button>';
  html += '<div class="cal-header__month">' + esc(monthName) + '</div>';
  html += '<button class="cal-nav" id="bcal-next">›</button>';
  html += '</div><div class="cal-grid">' + cells + '</div></div>';

  container.innerHTML = html;

  document.getElementById('bcal-prev').addEventListener('click', function() {
    batchCalMonth.setMonth(batchCalMonth.getMonth() - 1); renderBatchCal();
  });
  document.getElementById('bcal-next').addEventListener('click', function() {
    batchCalMonth.setMonth(batchCalMonth.getMonth() + 1); renderBatchCal();
  });

  // Click a date to pre-fill new batch form
  container.querySelectorAll('.cal-cell[data-batch-date]').forEach(function(cell) {
    cell.addEventListener('click', function() {
      var iso = cell.dataset.batchDate;
      var existing = (batchByDate[iso] || [])[0];
      openBatchModal(existing || null, iso);
    });
  });
}

// ── Batch modal ───────────────────────────────────────────────────
function openBatchModal(batch, prefillDate) {
  s.editingBatchId = batch ? batch._id : null;
  document.getElementById('batch-modal-title').textContent = batch ? 'Edit Batch' : 'New Batch';
  document.getElementById('bf-date').value    = batch ? batch.batchDate : (prefillDate || '');
  document.getElementById('bf-status').value  = batch ? batch.status : 'scheduled';
  document.getElementById('bf-public-note').value = batch ? (batch.publicNote || '') : '';
  document.getElementById('bf-notes').value   = batch ? (batch.notes || '') : '';
  var selected = batch ? (batch.productNames || []) : [];
  document.querySelectorAll('#bf-products input[type=checkbox]').forEach(function(cb) {
    cb.checked = selected.indexOf(cb.value) !== -1;
  });
  document.getElementById('batch-modal').classList.add('open');
}

function closeBatchModal() {
  document.getElementById('batch-modal').classList.remove('open');
  s.editingBatchId = null;
}

async function saveBatch() {
  var date     = document.getElementById('bf-date').value;
  var status   = document.getElementById('bf-status').value;
  var pubNote  = document.getElementById('bf-public-note').value.trim();
  var notes    = document.getElementById('bf-notes').value.trim();
  var products = [];
  document.querySelectorAll('#bf-products input[type=checkbox]:checked').forEach(function(cb) {
    products.push(cb.value);
  });
  if (!date) { toast('Please select a date', 'error'); return; }

  var btn = document.getElementById('batch-modal-save');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    if (s.editingBatchId) {
      var updateArgs = { batchId: s.editingBatchId, batchDate: date, productNames: products, status: status };
      if (pubNote) updateArgs.publicNote = pubNote;
      if (notes)   updateArgs.notes      = notes;
      await convexM('batches:updateBatch', updateArgs);
      toast('Batch updated');
    } else {
      var createArgs = { batchDate: date, productNames: products, status: status };
      if (pubNote) createArgs.publicNote = pubNote;
      if (notes)   createArgs.notes      = notes;
      await convexM('batches:createBatch', createArgs);
      toast('Batch created');
    }
    closeBatchModal();
    fetchBatches();
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  }
  btn.disabled = false;
  btn.textContent = 'Save batch';
}

// ── Render: Products view ─────────────────────────────────────────
function renderProducts() {
  if (!s.products.length) {
    document.getElementById('orders-container').innerHTML =
      '<div style="display:flex;align-items:center;gap:14px;margin-bottom:24px;">' +
        '<div class="batches-toolbar__title">Products</div>' +
        '<button class="products-seed-btn" id="seed-products-btn">Initialise products list</button>' +
      '</div>' +
      '<div class="empty-state">No products in database yet. Click "Initialise" to seed from the default list.</div>';
    document.getElementById('seed-products-btn').addEventListener('click', async function() {
      try {
        await convexM('products:seedProducts', {});
        toast('Products initialised');
        fetchProducts();
      } catch(e) { toast('Error: ' + e.message, 'error'); }
    });
    return;
  }

  var cats = {};
  s.products.forEach(function(p) {
    if (!cats[p.category]) cats[p.category] = [];
    cats[p.category].push(p);
  });
  cats = Object.keys(cats).sort().reduce(function(acc, k) { acc[k] = cats[k]; return acc; }, {});

  var html = '<div class="batches-toolbar">';
  html += '<div class="batches-toolbar__title">Products</div>';
  html += '<span style="font-size:12px;color:var(--muted)">Toggle the switch to mark a product as out of stock on the website.</span>';
  html += '</div>';
  html += '<div class="products-wrap">';

  Object.keys(cats).forEach(function(cat) {
    html += '<div class="products-cat-section">';
    html += '<div class="products-cat-title">' + esc(cat) + '</div>';
    html += '<div class="products-grid">';
    cats[cat].sort(function(a,b){ return a.displayOrder - b.displayOrder; }).forEach(function(p) {
      html += '<div class="product-toggle-card' + (!p.inStock ? ' product-toggle-card--oos' : '') + '" data-product-id="' + esc(p._id) + '">';
      html += '<div class="product-toggle-card__info">';
      html += '<div class="product-toggle-card__name">' + esc(p.name) + '</div>';
      html += '<div class="product-toggle-card__meta">KSh ' + p.price.toLocaleString() + ' / ' + esc(p.unit) + '</div>';
      html += '</div>';
      if (!p.inStock) html += '<span class="product-toggle-card__oos-tag">Out of stock</span>';
      html += '<label class="stock-toggle" title="' + (p.inStock ? 'Mark out of stock' : 'Mark in stock') + '">';
      html += '<input type="checkbox" class="product-stock-toggle" data-id="' + esc(p._id) + '" ' + (p.inStock ? 'checked' : '') + ' />';
      html += '<span class="stock-toggle__track"></span>';
      html += '</label>';
      html += '</div>';
    });
    html += '</div></div>';
  });
  html += '</div>';

  document.getElementById('orders-container').innerHTML = html;

  document.querySelectorAll('.product-stock-toggle').forEach(function(cb) {
    cb.addEventListener('change', async function() {
      var inStock = cb.checked;
      var id = cb.dataset.id;
      // optimistic update
      s.products = s.products.map(function(p) {
        return p._id === id ? Object.assign({}, p, { inStock: inStock }) : p;
      });
      renderProducts();
      try {
        await convexM('products:toggleStock', { productId: id, inStock: inStock });
        toast(inStock ? 'Marked in stock' : 'Marked out of stock');
      } catch(e) {
        toast('Error: ' + e.message, 'error');
        s.products = s.products.map(function(p) {
          return p._id === id ? Object.assign({}, p, { inStock: !inStock }) : p;
        });
        renderProducts();
      }
    });
  });
}

// ── Render single order card ──────────────────────────────────────
function renderCard(o) {
  var note   = esc(loadNote(o._id));
  var maps   = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent((o.deliveryAddress || '') + ', Nairobi, Kenya');
  var phone  = fmtPhone(o.customerPhone);

  var itemsHtml = o.items.map(function(i) {
    return '<div class="card-item"><span>' + esc(i.qty) + ' ' + esc(i.unit) + ' ' + esc(i.product) + '</span><span class="card-item__price">KSh ' + i.lineTotal.toLocaleString() + '</span></div>';
  }).join('');

  var mpesaHtml = o.mpesaCode
    ? '<div class="card-mpesa card-mpesa--ok"><span class="card-mpesa__label">M-Pesa</span><span class="card-mpesa__code">' + esc(o.mpesaCode) + '</span></div>'
    : '<div class="card-mpesa card-mpesa--missing"><span class="card-mpesa__label">M-Pesa</span><span class="card-mpesa__code">Not provided</span></div>';

  var actions = '';
  if (o.status === 'pending')   actions += '<button class="action-btn action-btn--confirm" data-order="' + esc(o._id) + '" data-status="confirmed">Confirm</button>';
  if (o.status === 'confirmed') actions += '<button class="action-btn action-btn--deliver" data-order="' + esc(o._id) + '" data-status="delivered">Mark delivered</button>';
  if (o.status !== 'pending')   actions += '<button class="action-btn action-btn--revert"  data-order="' + esc(o._id) + '" data-status="pending">Revert</button>';
  if (o.status !== 'cancelled') actions += '<button class="action-btn action-btn--cancel"  data-order="' + esc(o._id) + '" data-status="cancelled">Cancel</button>';
  actions += '<button class="action-btn action-btn--copy" data-copy-order="' + esc(o._id) + '" title="Copy confirmation message">Copy confirmation</button>';

  var notesRaw = loadNote(o._id);

  return '<div class="order-card order-card--' + esc(o.status) + '">' +
    '<div class="order-card__head">' +
      '<span class="card-num">' + esc(o.orderNumber) + '</span>' +
      '<span class="card-name">' + esc(o.customerName) + '</span>' +
      '<span class="card-age">' + esc(timeAgo(o.createdAt)) + '</span>' +
      '<span class="status-badge status-badge--' + esc(o.status) + '">' + esc(statusLabel(o.status)) + '</span>' +
    '</div>' +
    '<div class="order-card__body">' +
      '<div class="card-items">' + itemsHtml + '</div>' +
      '<div class="card-total-row">' +
        '<div class="card-total">KSh ' + o.total.toLocaleString() + '</div>' +
        mpesaHtml +
      '</div>' +
      '<div class="card-contact">' +
        '<a class="card-phone" href="tel:' + esc(phone) + '">' + esc(o.customerPhone) + '</a>' +
        '<div class="card-address"><a href="' + esc(maps) + '" target="_blank" rel="noopener">' + esc(o.deliveryAddress) + '</a></div>' +
        (o.notes ? '<div class="card-customer-note">"' + esc(o.notes) + '"</div>' : '') +
      '</div>' +
      '<div class="card-action-row">' +
        '<a class="btn-wa" href="https://wa.me/' + esc(phone) + '" target="_blank" rel="noopener">WhatsApp</a>' +
        '<div class="card-actions">' + actions + '</div>' +
      '</div>' +
      '<div class="card-admin-notes">' +
        '<label class="card-admin-notes__label">Admin note (local)</label>' +
        '<textarea class="card-admin-notes__input" data-order-id="' + esc(o._id) + '" placeholder="Add a note…" rows="1">' + (notesRaw ? esc(notesRaw) : '') + '</textarea>' +
      '</div>' +
    '</div>' +
  '</div>';
}

// ── Calendar modal ─────────────────────────────────────────────────
function openCalModal(fridayIso) {
  var display = getDisplayOrders();
  var dayOrders = display.filter(function(o) { return o.deliveryWeek === fridayIso && o.status !== 'cancelled'; });
  var date = new Date(fridayIso + 'T12:00:00');
  var title = date.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  document.getElementById('cal-modal-title').textContent = title;

  var pending   = dayOrders.filter(function(o){ return o.status === 'pending'; }).length;
  var confirmed = dayOrders.filter(function(o){ return o.status === 'confirmed' || o.status === 'delivered'; }).length;
  var revenue   = dayOrders.reduce(function(sum, o){ return sum + o.total; }, 0);

  document.getElementById('cal-modal-stats').innerHTML =
    '<div class="cal-modal-stat"><div class="cal-modal-stat__n">' + dayOrders.length + '</div><div class="cal-modal-stat__label">Orders</div></div>' +
    '<div class="cal-modal-stat"><div class="cal-modal-stat__n">' + confirmed + '</div><div class="cal-modal-stat__label">Confirmed</div></div>' +
    '<div class="cal-modal-stat"><div class="cal-modal-stat__n">KSh ' + revenue.toLocaleString() + '</div><div class="cal-modal-stat__label">Revenue</div></div>';

  var isDemo = s.orders.length === 0;
  var bodyHtml = isDemo ? '<div class="demo-banner">Demo data — no real orders yet</div>' : '';
  bodyHtml += dayOrders.length
    ? '<div class="orders-list">' + dayOrders.map(renderCard).join('') + '</div>'
    : '<div class="cal-modal-empty">No orders for this Friday.</div>';
  document.getElementById('cal-modal-body').innerHTML = bodyHtml;
  bindCardEvents(document.getElementById('cal-modal-body'));
  document.getElementById('cal-modal').classList.add('open');
}

function closeCalModal() {
  document.getElementById('cal-modal').classList.remove('open');
}

// ── Event bindings ────────────────────────────────────────────────
function bindCardEvents(container) {
  container = container || document.getElementById('orders-container');

  // Action buttons (status change)
  container.querySelectorAll('.action-btn[data-order]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      btn.disabled = true;
      updateStatus(btn.dataset.order, btn.dataset.status);
    });
  });

  // Copy confirmation button
  container.querySelectorAll('[data-copy-order]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var orderId = btn.dataset.copyOrder;
      var order = getDisplayOrders().find(function(o) { return o._id === orderId; });
      if (!order) return;
      var msg = buildConfirmationMsg(order);
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(msg).then(function() {
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(function() { btn.textContent = 'Copy confirmation'; btn.classList.remove('copied'); }, 2000);
        });
      } else {
        var ta = document.createElement('textarea');
        ta.value = msg; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent = 'Copied!'; btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Copy confirmation'; btn.classList.remove('copied'); }, 2000);
      }
    });
  });

  // Admin notes — debounced save
  container.querySelectorAll('.card-admin-notes__input').forEach(function(ta) {
    // auto-grow
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
    var timer;
    ta.addEventListener('input', function() {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
      clearTimeout(timer);
      timer = setTimeout(function() { saveNote(ta.dataset.orderId, ta.value.trim()); }, 500);
    });
  });
}

// ── Auth ──────────────────────────────────────────────────────────
function login() {
  var input = document.getElementById('pw-input');
  if (input.value === PW) {
    sessionStorage.setItem('rt-admin', '1');
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    boot();
  } else {
    document.getElementById('pw-error').style.display = 'block';
    input.value = '';
    input.focus();
  }
}
document.getElementById('pw-submit').addEventListener('click', login);
document.getElementById('pw-input').addEventListener('keydown', function(e){ if(e.key==='Enter') login(); });
document.getElementById('logout-btn').addEventListener('click', function() {
  sessionStorage.removeItem('rt-admin');
  location.reload();
});

// Auto-login via URL param
var urlKey = new URLSearchParams(location.search).get('key');
if (urlKey === PW) {
  sessionStorage.setItem('rt-admin', '1');
  history.replaceState(null, '', 'admin.html');
}

// ── Modal close ───────────────────────────────────────────────────
document.getElementById('cal-modal-close').addEventListener('click', closeCalModal);
document.getElementById('cal-modal').addEventListener('click', function(e) {
  if (e.target === document.getElementById('cal-modal')) closeCalModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeCalModal();
});

// ── Navigation ────────────────────────────────────────────────────
document.querySelectorAll('[data-view]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    s.view = btn.dataset.view;
    sessionStorage.setItem('rt-admin-view', s.view);
    document.querySelectorAll('[data-view]').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    render();
  });
});

// Week nav
document.getElementById('week-prev').addEventListener('click', function() { s.weekOffset--; render(); fetchOrders(); });
document.getElementById('week-next').addEventListener('click', function() { s.weekOffset++; render(); fetchOrders(); });

// Status filter chips
document.querySelectorAll('[data-filter]').forEach(function(chip) {
  chip.addEventListener('click', function() {
    s.statusFilter = chip.dataset.filter;
    document.querySelectorAll('[data-filter]').forEach(function(c){ c.classList.remove('active'); });
    chip.classList.add('active');
    render();
  });
});

// Bulk confirm
document.getElementById('bulk-btn').addEventListener('click', bulkConfirm);

// Manual refresh
document.getElementById('refresh-btn').addEventListener('click', function() {
  fetchOrders();
  fetchBatches();
  fetchProducts();
});

// Batch modal buttons
document.getElementById('batch-modal-close').addEventListener('click', closeBatchModal);
document.getElementById('batch-modal-cancel').addEventListener('click', closeBatchModal);
document.getElementById('batch-modal-save').addEventListener('click', saveBatch);
document.getElementById('batch-modal').addEventListener('click', function(e) {
  if (e.target === document.getElementById('batch-modal')) closeBatchModal();
});

// ── Boot ──────────────────────────────────────────────────────────
function boot() {
  // Restore saved tab
  var savedView = sessionStorage.getItem('rt-admin-view');
  if (savedView && document.querySelector('[data-view="' + savedView + '"]')) {
    s.view = savedView;
    document.querySelectorAll('[data-view]').forEach(function(b){ b.classList.remove('active'); });
    document.querySelector('[data-view="' + savedView + '"]').classList.add('active');
  }
  fetchOrders();
  fetchBatches();
  fetchProducts();
  setInterval(function() { fetchOrders(); fetchBatches(); fetchProducts(); }, 30000);
}

if (sessionStorage.getItem('rt-admin') === '1') {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  boot();
}

})();
</script>
